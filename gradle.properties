# Project-wide Gradle settings.

# Memory and Speed Optimization
# Increased heap to 3072m to support R8 Full Mode's heavy analysis
# Enable the daemon and parallel execution for much faster build times
org.gradle.jvmargs=-Xmx3072m -Dfile.encoding=UTF-8
org.gradle.daemon=true
org.gradle.parallel=true

# JDK Management
# Automatically handle the JDK 17 requirement
org.gradle.java.installations.auto-detect=true
org.gradle.java.installations.auto-download=true

# AndroidX & Modern Build Standards
# Essential for modern libraries and faster R-class generation
android.useAndroidX=true
android.nonTransitiveRClass=true
kotlin.code.style=official

# R8 & Shrinking
# Full Mode aggressively strips unused code for the smallest possible APK
android.enableR8.fullMode=true
# The new resource shrinker is stable and highly recommended for asset-heavy apps
android.experimental.enableNewResourceShrinker=true